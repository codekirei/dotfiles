# https://thevaluable.dev/tmux-config-mouseless/

# Unbinds ----------------------------------------------------------------------
unbind %
unbind '"'
unbind C-b
unbind L
unbind a
unbind h
unbind j
unbind k
unbind l
unbind q
unbind r
unbind s
unbind t
unbind v

# New Binds --------------------------------------------------------------------
# reload config
bind r source-file "${XDG_CONFIG_HOME}/tmux/tmux.conf" \; display "Reloaded tmux.conf"
# splits
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
# fancy session switcher
bind-key a display-popup -E -w 90% -h 90% "
  tmux ls -F '#{session_name}' \
  | grep -vxF \"$(tmux display-message -p '#S')\" \
  | fzf \
      --print0 \
      --prompt='session | ' \
      --preview-window='right:70%' \
      --preview 'tmux capture-pane -ep -t {}:1.1 | head -n 42 | bat --color=always --style=plain --paging=never' \
  | xargs -0 -r tmux switch-client -t
"
# vim-like movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# convenient quick swaps
bind C-f select-window -t!
bind C-a switch-client -l
# set up a quake-style split
bind q splitw -fvb -l10 -c "#{pane_current_path}"
# toggle status bar visibility
bind t set-option status

# Settings ---------------------------------------------------------------------
set -g detach-on-destroy off
# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
# Renumber windows to prevent gaps (e.g. 1 2 4 5)
set -g renumber-windows on
# make delay shorter
set -sg escape-time 0
# vim mode
set -g status-keys vi
set -g mode-keys vi
# move statusbar to top of screen
set-option -g status-position top

# Colors -----------------------------------------------------------------------
# catpuccin is cool, check that out
set-option -sa terminal-features ',alacritty:RGB'
set-option -ga terminal-features ",alacritty:usstyle"
set-option -ga terminal-overrides ',alacritty:Tc'
set -g default-terminal "xterm-256color"

# vim: ft=tmux
